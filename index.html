<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f8f8f8;
}

/* Tabs */
.tabs {
  display:flex;
  background:#111;
}
.tabs button {
  flex:1;
  padding:14px;
  border:none;
  background:#111;
  color:white;
  cursor:pointer;
  font-size:14px;
}
.tabs button:hover {
  background:#333;
}

/* Content */
.tab-content {
  display:none;
  padding:20px;
}
.active {
  display:block;
}

/* Section */
.section-title {
  color:#d62828;
  margin-top:20px;
  font-weight:bold;
}

/* Menu item */
.item {
  display:flex;
  align-items:center;
  margin:10px 0;
  gap:12px;
}
.item img {
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}
.item-name {
  flex:1;
}
.price {
  font-weight:bold;
}
</style>

</head>

<body>

<!-- TABS -->
<div class="tabs">
  <button onclick="openTab('kitchen')">Kitchen</button>
  <button onclick="openTab('ramyun')">Ramyun</button>
  <button onclick="openTab('toppings')">Toppings</button>
  <button onclick="openTab('beverages')">Beverages</button>
</div>

<!-- KITCHEN -->
<div id="kitchen" class="tab-content active">

  <div class="item">
    <img src="images/kitchen/burger.jpg">
    <div class="item-name">Burger</div>
    <div class="price">₹120</div>
  </div>

  <div class="item">
    <img src="images/kitchen/fries.jpg">
    <div class="item-name">Fries</div>
    <div class="price">₹80</div>
  </div>

</div>

<!-- RAMYUN -->
<div id="ramyun" class="tab-content">

  <div class="item">
    <img src="images/ramyun/spicy_ramyun.jpg">
    <div class="item-name">Spicy Ramyun</div>
    <div class="price">₹150</div>
  </div>

</div>

<!-- TOPPINGS -->
<div id="toppings" class="tab-content">

  <div class="item">
    <img src="images/toppings/cheese.jpg">
    <div class="item-name">Cheese</div>
    <div class="price">₹30</div>
  </div>

</div>

<!-- BEVERAGES -->
<div id="beverages" class="tab-content">

  <div class="section-title">Fruit Drinks</div>

  <div class="item">
    <img src="images/beverages/mango_drink.jpg">
    <div class="item-name">Mango Drink</div>
    <div class="price">₹90</div>
  </div>

  <div class="section-title">Milk Based</div>

  <div class="item">
    <img src="images/beverages/milkshake.jpg">
    <div class="item-name">Milkshake</div>
    <div class="price">₹120</div>
  </div>

  <div class="section-title">Ice Tea</div>

  <div class="item">
    <img src="images/beverages/iced_tea.jpg">
    <div class="item-name">Iced Tea</div>
    <div class="price">₹70</div>
  </div>

  <div class="section-title">Coffee (Hot)</div>

  <div class="item">
    <img src="images/beverages/hot_coffee.jpg">
    <div class="item-name">Hot Coffee</div>
    <div class="price">₹80</div>
  </div>

  <div class="section-title">Coffee (Cold)</div>

  <div class="item">
    <img src="images/beverages/cold_coffee.jpg">
    <div class="item-name">Cold Coffee</div>
    <div class="price">₹110</div>
  </div>

  <div class="section-title">Water</div>

  <div class="item">
    <img src="images/beverages/water.jpg">
    <div class="item-name">Mineral Water</div>
    <div class="price">₹40</div>
  </div>

</div>

<script>
function openTab(tab) {
  let tabs = document.querySelectorAll(".tab-content");
  tabs.forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}
</script>

</body>
</html>
